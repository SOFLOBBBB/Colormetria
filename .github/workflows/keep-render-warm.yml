name: Keep Render Warm

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          respuesta=$(curl -s -o /dev/null -w "%{http_code}" https://api.xn--colormetra-s8a.com/health)
          echo "Health check: $respuesta"
