# Blueprint Render — backend ColorMetría
# Runtime Docker: instala Mesa/EGL/GLES (libGLESv2.so.2). El runtime "python"
# solo hace pip install y NO ejecuta el Dockerfile.

services:
  - type: web
    runtime: docker
    name: colormetria-api
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: MPLBACKEND
        value: Agg
